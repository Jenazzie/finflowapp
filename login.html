<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FinFlowApp — Inloggen</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080a0f;color:#e2e8f8;font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;min-height:100vh;display:flex;flex-direction:column}
.page{flex:1;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#0d1117;border:1px solid #1a1f2e;border-radius:16px;padding:40px;width:100%;max-width:400px;box-shadow:0 24px 64px rgba(0,0,0,0.5)}
.logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:32px}
.logo-box{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#4f8ef7,#7c4dff);display:flex;align-items:center;justify-content:center}
.logo-text{font-weight:700;font-size:18px;letter-spacing:-.02em}
h1{font-size:22px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px;text-align:center}
.subtitle{font-size:13px;color:#8892aa;text-align:center;margin-bottom:28px}
.form-group{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;color:#8892aa;margin-bottom:6px;letter-spacing:.02em}
input{width:100%;background:#0f1318;border:1px solid #1a1f2e;color:#e2e8f8;border-radius:8px;padding:11px 14px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
input:focus{border-color:#4f8ef760}
input::placeholder{color:#4a5368}
.btn{width:100%;border:none;border-radius:9px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;margin-top:4px}
.btn-primary{background:linear-gradient(135deg,#4f8ef7,#7c4dff);color:#fff}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:#4a5368;font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#1a1f2e}
.link-btn{width:100%;background:transparent;border:1px solid #1a1f2e;color:#8892aa;border-radius:9px;padding:11px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.link-btn:hover{border-color:#4f8ef7;color:#4f8ef7}
.forgot{text-align:right;margin-top:-8px;margin-bottom:16px}
.forgot a{font-size:12px;color:#4a5368;cursor:pointer;transition:color .15s}
.forgot a:hover{color:#4f8ef7}
.register-link{text-align:center;margin-top:24px;font-size:13px;color:#8892aa}
.register-link a{color:#4f8ef7;cursor:pointer;font-weight:600}
.register-link a:hover{text-decoration:underline}
.alert{border-radius:8px;padding:11px 14px;font-size:13px;margin-bottom:16px;display:none}
.alert-error{background:#f8717112;border:1px solid #f8717140;color:#f87171}
.alert-success{background:#34d39912;border:1px solid #34d39940;color:#34d399}
.loading{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
footer{text-align:center;padding:16px;font-size:11px;color:#4a5368}
footer a{color:#4a5368}
footer a:hover{color:#8892aa}
</style>
</head>
<body>

<div class="page">
  <div class="card">
    <div class="logo">
      <div class="logo-box">
        <svg width="18" height="18" viewBox="0 0 14 14" fill="none">
          <rect x="1" y="7" width="3" height="6" rx="1" fill="white" fill-opacity=".9"/>
          <rect x="5.5" y="4" width="3" height="9" rx="1" fill="white"/>
          <rect x="10" y="1" width="3" height="12" rx="1" fill="white" fill-opacity=".7"/>
        </svg>
      </div>
      <span class="logo-text">FinFlowApp</span>
    </div>

    <h1>Welkom terug</h1>
    <p class="subtitle">Log in op jouw financieel dashboard</p>

    <div class="alert alert-error" id="errorMsg"></div>
    <div class="alert alert-success" id="successMsg"></div>

    <div id="loginForm">
      <div class="form-group">
        <label>E-mailadres</label>
        <input type="email" id="email" placeholder="jouw@bedrijf.nl" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>Wachtwoord</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
               onkeydown="if(event.key==='Enter')login()"/>
      </div>
      <div class="forgot"><a onclick="showForgot()">Wachtwoord vergeten?</a></div>
      <button class="btn btn-primary" id="loginBtn" onclick="login()">Inloggen</button>
      <div class="divider">of</div>
      <button class="link-btn" onclick="window.location.href='register.html'">Nieuw account aanmaken</button>
    </div>

    <div id="forgotForm" style="display:none">
      <p style="font-size:13px;color:#8892aa;margin-bottom:20px">Vul je e-mailadres in. We sturen je een link om je wachtwoord opnieuw in te stellen.</p>
      <div class="form-group">
        <label>E-mailadres</label>
        <input type="email" id="forgotEmail" placeholder="jouw@bedrijf.nl"/>
      </div>
      <button class="btn btn-primary" id="forgotBtn" onclick="sendReset()">Reset-link versturen</button>
      <div class="divider">of</div>
      <button class="link-btn" onclick="showLogin()">← Terug naar inloggen</button>
    </div>

    <div class="register-link">
      Nog geen account? <a onclick="window.location.href='register.html'">Gratis proberen</a>
    </div>
  </div>
</div>

<footer>
  <a href="index.html">← Terug naar finflowapp.ai</a> &nbsp;·&nbsp;
  <a href="#">Privacy</a> &nbsp;·&nbsp;
  <a href="mailto:jenot@finflowapp.ai">Contact</a>
</footer>

<script>
const SUPABASE_URL = "https://jombvmzuwmtdbejvrnjx.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpvbWJ2bXp1d210ZGJlanZybmp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4MzU1NjQsImV4cCI6MjA5NDQxMTU2NH0.rg6qP-Mz91ZVleMUAQiI4iWV-3EpgllZ5F-Vhg9SGiw";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Check if already logged in
sb.auth.getSession().then(({data:{session}})=>{
  if(session) window.location.href = "dashboard.html";
});

function showError(msg){ const el=document.getElementById("errorMsg"); el.textContent=msg; el.style.display="block"; document.getElementById("successMsg").style.display="none"; }
function showSuccess(msg){ const el=document.getElementById("successMsg"); el.textContent=msg; el.style.display="block"; document.getElementById("errorMsg").style.display="none"; }
function clearAlerts(){ document.getElementById("errorMsg").style.display="none"; document.getElementById("successMsg").style.display="none"; }

function setLoading(btnId, loading, text){
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="loading"></span>Bezig...' : text;
}

async function login(){
  clearAlerts();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  if(!email || !password){ showError("Vul e-mailadres en wachtwoord in."); return; }

  setLoading("loginBtn", true, "Inloggen");
  const { error } = await sb.auth.signInWithPassword({ email, password });
  setLoading("loginBtn", false, "Inloggen");

  if(error){
    if(error.message.includes("Invalid login")) showError("Onjuist e-mailadres of wachtwoord.");
    else if(error.message.includes("Email not confirmed")) showError("Bevestig eerst je e-mailadres via de link die je hebt ontvangen.");
    else showError(error.message);
    return;
  }
  window.location.href = "dashboard.html";
}

async function sendReset(){
  clearAlerts();
  const email = document.getElementById("forgotEmail").value.trim();
  if(!email){ showError("Vul je e-mailadres in."); return; }

  setLoading("forgotBtn", true, "Reset-link versturen");
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + "/login.html"
  });
  setLoading("forgotBtn", false, "Reset-link versturen");

  if(error){ showError(error.message); return; }
  showSuccess("Reset-link verstuurd! Controleer je inbox.");
}

function showForgot(){
  document.getElementById("loginForm").style.display="none";
  document.getElementById("forgotForm").style.display="block";
  clearAlerts();
}
function showLogin(){
  document.getElementById("forgotForm").style.display="none";
  document.getElementById("loginForm").style.display="block";
  clearAlerts();
}
</script>
</body>
</html>
